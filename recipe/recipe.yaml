schema_version: 1

context:
  name: cupy-xarray
  version: 0.1.5
  python_min: "3.10"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name | replace('-', '_') }}-${{ version }}.tar.gz
  sha256: 87ed31c49fb538f793c6ded8ecb6bd056bafe02e17dc686551b945e26f64c2e4

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - setuptools >=77
    - versioneer
  run:
    - cupy
    - python >=${{ python_min }}
    - xarray >=2024.02.0

tests:
  - python:
      imports:
        - cupy_xarray
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  homepage: https://github.com/xarray-contrib/cupy-xarray
  documentation: https://cupy-xarray.readthedocs.io
  repository: https://github.com/xarray-contrib/cupy-xarray
  summary: Interface for using cupy in xarray, providing convenience accessors.
  license: Apache-2.0
  license_file:
    - LICENSE

extra:
  recipe-maintainers:
    - andersy005
    - dcherian
    - jacobtomlinson
    - jakirkham
    - weiji14
