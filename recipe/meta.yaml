{% set name = "cupy-xarray" %}
{% set version = "0.1.5" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 87ed31c49fb538f793c6ded8ecb6bd056bafe02e17dc686551b945e26f64c2e4

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
    - versioneer
  run:
    - cupy
    - python >={{ python_min }}
    - xarray >=2024.02.0

test:
  imports:
    - cupy_xarray
  commands:
    - pip check
  requires:
    - cupy-core
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/xarray-contrib/cupy-xarray
  doc_url: https://cupy-xarray.readthedocs.io
  dev_url: https://github.com/xarray-contrib/cupy-xarray
  summary: Interface for using cupy in xarray, providing convenience accessors.
  license: Apache-2.0
  license_file:
    - LICENSE

extra:
  recipe-maintainers:
    - andersy005
    - dcherian
    - jacobtomlinson
    - jakirkham
    - weiji14
